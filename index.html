<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BinaryTrade Pro</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0e13;--bg2:#131720;--bg3:#1a2030;--border:#252d3d;
  --text:#e2e8f0;--muted:#64748b;
  --green:#22c55e;--red:#ef4444;--blue:#3b82f6;--yellow:#eab308;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Sarabun',sans-serif;overflow-x:hidden}
.app{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--bg)}

/* ─── HEADER ─── */
.header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.ham-btn{width:32px;height:28px;display:flex;flex-direction:column;justify-content:center;gap:5px;cursor:pointer;flex-shrink:0}
.ham-btn span{display:block;height:2px;background:var(--muted);border-radius:2px}
.balance-info{font-size:12px;color:var(--muted);margin-left:8px}
.balance-info .bal{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:15px;color:var(--green)}
.pair-btn{display:flex;align-items:center;gap:7px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:7px 12px;cursor:pointer;font-weight:700;font-size:14px;color:var(--text)}
.coin-icon{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0}
.settings-btn{width:32px;height:32px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:16px}

/* ─── PRICE SECTION ─── */
.price-section{text-align:center;padding:14px 16px 8px;background:var(--bg2);border-bottom:1px solid var(--border)}
#currentPrice{font-family:'JetBrains Mono',monospace;font-size:36px;font-weight:700;color:var(--green);transition:color .25s;line-height:1.1}
.price-change{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--green);margin-top:3px;transition:color .25s}
.price-ticker{font-size:11px;color:var(--muted);margin-top:4px;display:flex;align-items:center;justify-content:center;gap:5px}
#connDot{width:6px;height:6px;border-radius:50%;background:var(--yellow);flex-shrink:0;transition:background .5s}

/* ─── CHART ─── */
.chart-section{background:var(--bg);position:relative;overflow:hidden}
.ohlc-bar{display:flex;gap:10px;padding:5px 10px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}
.ohlc-val{color:var(--text);margin-left:1px}
#chartCanvas{display:block;width:100%;cursor:crosshair}
.chart-controls{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;background:var(--bg2);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.tf-group{display:flex;gap:3px}
.tf-btn{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all .2s}
.tf-btn.active{background:var(--blue);color:#fff}
.tf-btn:hover:not(.active){color:var(--text);background:var(--bg3)}
.conn-info{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
#connDot2{width:6px;height:6px;border-radius:50%;background:var(--yellow);transition:background .5s}

/* ─── ACTIVE TRADES ─── */
#activeTradesWrap{background:var(--bg)}
.active-card{display:flex;align-items:center;gap:10px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin:6px 14px 0}
.timer-ring{position:relative;width:36px;height:36px;flex-shrink:0}
.timer-ring svg{transform:rotate(-90deg)}
.timer-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--text)}

/* ─── TRADE PANEL ─── */
.trade-panel{padding:12px 14px;background:var(--bg2);border-top:1px solid var(--border)}
.amount-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.amount-label{font-size:13px;color:var(--muted);font-weight:600;width:54px;flex-shrink:0}
.amount-input{background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:var(--text);width:88px;text-align:center;outline:none}
.amount-input:focus{border-color:var(--blue)}
.quick-btns{display:flex;gap:5px;flex:1}
.quick-btn{flex:1;padding:8px 2px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;text-align:center;transition:all .15s}
.quick-btn:hover{border-color:var(--blue);color:var(--blue)}
.quick-btn:active{transform:scale(.96)}
.payout-info{display:flex;justify-content:flex-end;align-items:center;gap:20px;margin-bottom:10px;font-size:12.5px;color:var(--muted)}
.payout-info .pval{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--green)}
.trade-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-sell,.btn-buy{padding:15px;border:none;border-radius:10px;color:#fff;font-size:17px;font-weight:800;cursor:pointer;letter-spacing:.5px;display:flex;align-items:center;justify-content:center;gap:7px;transition:transform .1s,filter .2s;font-family:'Sarabun',sans-serif}
.btn-sell{background:linear-gradient(135deg,#b91c1c,#ef4444)}
.btn-buy{background:linear-gradient(135deg,#15803d,#22c55e)}
.btn-sell:active,.btn-buy:active{transform:scale(.97)}
.btn-sell:disabled,.btn-buy:disabled{filter:brightness(.55);cursor:not-allowed}
.reset-btn{display:block;width:100%;padding:9px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:12px;cursor:pointer;text-align:center;margin-top:8px;transition:all .2s;font-family:'Sarabun',sans-serif}
.reset-btn:hover{border-color:var(--blue);color:var(--blue)}

/* ─── HISTORY ─── */
.history-section{padding:14px;flex:1}
.history-title{font-size:14px;font-weight:700;margin-bottom:10px}
.history-table{width:100%;border-collapse:collapse;font-size:11px}
.history-table th{color:var(--muted);font-weight:600;padding:5px 4px;text-align:left;border-bottom:1px solid var(--border);font-size:10px}
.history-table td{padding:7px 4px;border-bottom:1px solid rgba(37,45,61,.7);font-family:'JetBrains Mono',monospace}
.history-table tr:last-child td{border-bottom:none}
.buy-lbl{color:var(--green);font-weight:700}.sell-lbl{color:var(--red);font-weight:700}
.win-lbl{color:var(--green);font-weight:700}.loss-lbl{color:var(--red);font-weight:700}
.empty-row{text-align:center;color:var(--muted);padding:24px;font-size:12px;font-family:'Sarabun',sans-serif}

/* ─── BOTTOM NAV ─── */
.bottom-nav{display:grid;grid-template-columns:repeat(4,1fr);background:var(--bg2);border-top:1px solid var(--border);position:sticky;bottom:0;z-index:100}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 8px;cursor:pointer;color:var(--muted);font-size:10px;transition:color .2s}
.nav-item.active{color:var(--blue)}
.nav-item svg{width:20px;height:20px}

/* ─── NOTIFICATION ─── */
#notification{position:fixed;top:64px;left:50%;transform:translateX(-50%) translateY(-8px);z-index:500;padding:12px 24px;border-radius:50px;font-weight:800;font-size:15px;opacity:0;pointer-events:none;transition:all .3s;white-space:nowrap}
#notification.win{background:linear-gradient(135deg,#15803d,#22c55e);color:#fff;box-shadow:0 4px 20px rgba(34,197,94,.4)}
#notification.loss{background:linear-gradient(135deg,#b91c1c,#ef4444);color:#fff;box-shadow:0 4px 20px rgba(239,68,68,.4)}
#notification.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ─── PAIR MODAL ─── */
#pairModal{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center}
#pairModal.show{display:flex}
.modal-box{background:var(--bg3);border:1px solid var(--border);border-radius:16px;width:290px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.modal-hdr{padding:13px 16px;font-weight:700;font-size:15px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-close{color:var(--muted);cursor:pointer;font-size:20px;line-height:1}
.pair-opt{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;transition:background .15s;border-bottom:1px solid var(--border)}
.pair-opt:last-child{border-bottom:none}
.pair-opt:hover{background:rgba(59,130,246,.1)}
.pair-opt.sel{background:rgba(59,130,246,.15)}
.pair-opt-name{font-weight:700;font-size:14px}
.pair-opt-sub{font-size:11px;color:var(--muted)}
.checkmark{margin-left:auto;color:var(--blue);display:none}
.pair-opt.sel .checkmark{display:block}
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div style="display:flex;align-items:center">
      <div class="ham-btn">
        <span></span><span></span><span></span>
      </div>
      <div class="balance-info">Balance: <span class="bal" id="balDisp">$10,000.00</span></div>
    </div>
    <div class="pair-btn" id="pairBtn" onclick="openPairModal()">
      <div class="coin-icon" id="pairIconEl" style="background:#f7931a">₿</div>
      <span id="pairNameEl">BTC/USDT</span>
      <span style="font-size:10px;color:var(--muted);margin-left:2px">▼</span>
    </div>
    <div class="settings-btn">⚙</div>
  </div>

  <!-- PRICE -->
  <div class="price-section">
    <div id="currentPrice">$——,———.——</div>
    <div class="price-change" id="priceChange">+0.00 (+0.00%)</div>
    <div class="price-ticker">
      <div id="connDot"></div>
      <span id="tickInfo">กำลังเชื่อมต่อ Binance...</span>
    </div>
  </div>

  <!-- CHART -->
  <div class="chart-section" id="chartSec">
    <div class="ohlc-bar">
      <span>O <span class="ohlc-val" id="oO">—</span></span>
      <span>H <span class="ohlc-val" id="oH">—</span></span>
      <span>L <span class="ohlc-val" id="oL">—</span></span>
      <span>C <span class="ohlc-val" id="oC">—</span></span>
    </div>
    <canvas id="chartCanvas"></canvas>
  </div>

  <!-- CHART CONTROLS -->
  <div class="chart-controls">
    <div class="tf-group">
      <button class="tf-btn active" onclick="app.changeInterval('1m',this)">1m</button>
      <button class="tf-btn" onclick="app.changeInterval('5m',this)">5m</button>
      <button class="tf-btn" onclick="app.changeInterval('15m',this)">15m</button>
    </div>
    <div class="conn-info">
      <div id="connDot2"></div>
      <span id="connText">เชื่อมต่อ...</span>
    </div>
  </div>

  <!-- ACTIVE TRADES -->
  <div id="activeTradesWrap"></div>

  <!-- TRADE PANEL -->
  <div class="trade-panel">
    <div class="amount-row">
      <span class="amount-label">Amount</span>
      <input type="number" class="amount-input" id="amtInput" value="10" min="1" oninput="app.onAmtInput(this.value)">
      <div class="quick-btns">
        <div class="quick-btn" onclick="app.addAmt(10)">+10</div>
        <div class="quick-btn" onclick="app.addAmt(50)">+50</div>
        <div class="quick-btn" onclick="app.addAmt(100)">+100</div>
        <div class="quick-btn" onclick="app.setMax()">MAX</div>
      </div>
    </div>
    <div class="payout-info">
      <span>Payout: <span class="pval">90%</span></span>
      <span>Profit: <span class="pval" id="profDisp">+$9.00</span></span>
    </div>
    <div class="trade-btns">
      <button class="btn-sell" onclick="app.placeTrade('sell')">↓ SELL</button>
      <button class="btn-buy" onclick="app.placeTrade('buy')">↑ BUY</button>
    </div>
    <button class="reset-btn" onclick="app.resetBalance()">🔄 รีเซ็ตยอดทดลอง $10,000</button>
  </div>

  <!-- HISTORY -->
  <div class="history-section">
    <div class="history-title">Trade History</div>
    <table class="history-table">
      <thead><tr>
        <th>Time</th><th>Pair</th><th>Type</th><th>Entry</th>
        <th>Close</th><th>Amt</th><th>Result</th><th>Profit</th>
      </tr></thead>
      <tbody id="histBody">
        <tr><td colspan="8" class="empty-row">ยังไม่มีประวัติการเทรด</td></tr>
      </tbody>
    </table>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <div class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Trade
    </div>
    <div class="nav-item" onclick="document.querySelector('.history-section').scrollIntoView({behavior:'smooth'})">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      History
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
      Settings
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Help
    </div>
  </div>
</div>

<!-- NOTIFICATION -->
<div id="notification"></div>

<!-- PAIR MODAL -->
<div id="pairModal" onclick="if(event.target===this)closePairModal()">
  <div class="modal-box">
    <div class="modal-hdr">
      <span>เลือกคู่เทรด</span>
      <span class="modal-close" onclick="closePairModal()">✕</span>
    </div>
    <div id="pairList"></div>
  </div>
</div>

<script>
// ================================================================
//  BINARY TRADE PRO — Real Binance Data, Demo Balance
// ================================================================

const PAIRS = [
  {sym:'BTCUSDT', name:'BTC/USDT', icon:'₿', color:'#f7931a', dec:2},
  {sym:'ETHUSDT', name:'ETH/USDT', icon:'Ξ', color:'#627eea', dec:2},
  {sym:'BNBUSDT', name:'BNB/USDT', icon:'B', color:'#f3ba2f', dec:3},
  {sym:'SOLUSDT', name:'SOL/USDT', icon:'◎', color:'#9945ff', dec:3},
  {sym:'XRPUSDT', name:'XRP/USDT', icon:'✦', color:'#00aae4', dec:4},
  {sym:'DOGEUSDT',name:'DOGE/USDT',icon:'Ð', color:'#c2a633', dec:5},
];

class App {
  constructor(){
    this.bal    = parseFloat(localStorage.getItem('bt_bal')||'10000');
    this.sym    = localStorage.getItem('bt_sym')||'BTCUSDT';
    this.intv   = '1m';
    this.amt    = 10;
    this.candles= [];
    this.live   = null;   // forming candle
    this.price  = 0;
    this.prev   = 0;
    this.base   = 0;      // first candle open (for % change)
    this.tick   = 0;      // last ws tick timestamp
    this.trades = [];     // active trades
    this.hist   = JSON.parse(localStorage.getItem('bt_hist')||'[]');
    this.ws     = null;
    this.wsTimer= null;
    this.dpr    = Math.min(window.devicePixelRatio||1, 2);
    this.canvas = document.getElementById('chartCanvas');
    this.ctx    = this.canvas.getContext('2d');
    this.cw=0; this.ch=0;
    this._notif = null;
    this.init();
  }

  async init(){
    this.resize();
    window.addEventListener('resize',()=>{this.resize()});
    this.refreshPairUI();
    this.refreshBalUI();
    this.refreshProfUI();
    this.refreshHistUI();
    this.renderPairModal();
    await this.loadCandles();
    this.connectWS();
    this.startLoop();
    this.startCheckLoop();
  }

  /* ── Canvas Sizing ── */
  resize(){
    const sec = document.getElementById('chartSec');
    const w = sec.clientWidth;
    const h = Math.round(Math.min(290, Math.max(200, window.innerHeight*0.33)));
    this.canvas.style.width  = w+'px';
    this.canvas.style.height = h+'px';
    this.canvas.width  = Math.floor(w*this.dpr);
    this.canvas.height = Math.floor(h*this.dpr);
    this.cw=w; this.ch=h;
  }

  /* ── Data Loading ── */
  async loadCandles(){
    try{
      const url=`https://api.binance.com/api/v3/klines?symbol=${this.sym}&interval=${this.intv}&limit=120`;
      const r=await fetch(url);
      const d=await r.json();
      this.candles=d.slice(0,-1).map(x=>({t:x[0],o:+x[1],h:+x[2],l:+x[3],c:+x[4]}));
      const last=d[d.length-1];
      this.live={t:last[0],o:+last[1],h:+last[2],l:+last[3],c:+last[4]};
      this.price=this.live.c;
      this.base=this.candles.length?this.candles[0].o:this.price;
      this.refreshPriceUI();
      this.refreshOHLC();
    }catch(e){console.warn('REST failed:',e)}
  }

  /* ── WebSocket ── */
  connectWS(){
    if(this.ws){this.ws.onclose=null;try{this.ws.close()}catch(e){}}
    const url=`wss://stream.binance.com:9443/ws/${this.sym.toLowerCase()}@kline_${this.intv}`;
    this.ws=new WebSocket(url);
    this.ws.onopen=()=>{
      this.setConn('green','Live');
      if(this.wsTimer){clearTimeout(this.wsTimer);this.wsTimer=null}
    };
    this.ws.onmessage=(e)=>{
      const m=JSON.parse(e.data);
      if(m.e!=='kline')return;
      const k=m.k;
      this.prev=this.price;
      this.price=+k.c;
      this.tick=Date.now();
      const c={t:k.t,o:+k.o,h:+k.h,l:+k.l,c:+k.c};
      if(k.x){
        this.candles.push(c);
        if(this.candles.length>300)this.candles.shift();
        this.live=null;
      } else {
        this.live=c;
      }
      this.refreshPriceUI();
      this.refreshOHLC();
    };
    this.ws.onerror=()=>this.setConn('red','Error');
    this.ws.onclose=()=>{
      this.setConn('#eab308','ตัดการเชื่อมต่อ');
      this.wsTimer=setTimeout(()=>{this.setConn('#eab308','กำลังเชื่อมต่อใหม่...');this.connectWS()},3500);
    };
  }

  setConn(color,text){
    document.getElementById('connDot').style.background=color;
    document.getElementById('connDot2').style.background=color;
    document.getElementById('connText').textContent=text;
  }

  /* ── UI Refresh ── */
  refreshPriceUI(){
    const pair=PAIRS.find(p=>p.sym===this.sym)||PAIRS[0];
    const el=document.getElementById('currentPrice');
    el.textContent='$'+this.price.toLocaleString('en-US',{minimumFractionDigits:pair.dec,maximumFractionDigits:pair.dec});
    const up=this.price>=this.prev;
    el.style.color=up?'var(--green)':'var(--red)';
    if(this.base>0){
      const d=this.price-this.base, p=(d/this.base*100), s=d>=0?'+':'';
      const ch=document.getElementById('priceChange');
      ch.textContent=`${s}${d.toFixed(pair.dec)} (${s}${p.toFixed(2)}%)`;
      ch.style.color=d>=0?'var(--green)':'var(--red)';
    }
    const sec=Math.floor((Date.now()-this.tick)/1000);
    document.getElementById('tickInfo').textContent=
      this.tick===0?'รอข้อมูล...':(sec<2?'Live':sec+'s ที่แล้ว');
  }

  refreshOHLC(){
    const c=this.live||(this.candles.length?this.candles[this.candles.length-1]:null);
    if(!c)return;
    const pair=PAIRS.find(p=>p.sym===this.sym)||PAIRS[0];
    const d=pair.dec;
    document.getElementById('oO').textContent=c.o.toFixed(d);
    document.getElementById('oH').textContent=c.h.toFixed(d);
    document.getElementById('oL').textContent=c.l.toFixed(d);
    document.getElementById('oC').textContent=c.c.toFixed(d);
  }

  refreshBalUI(){
    document.getElementById('balDisp').textContent=
      '$'+this.bal.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  }

  refreshProfUI(){
    document.getElementById('profDisp').textContent='+$'+(this.amt*0.9).toFixed(2);
  }

  refreshHistUI(){
    const tb=document.getElementById('histBody');
    if(!this.hist.length){
      tb.innerHTML='<tr><td colspan="8" class="empty-row">ยังไม่มีประวัติการเทรด</td></tr>';return;
    }
    tb.innerHTML=this.hist.slice(0,12).map(h=>`
      <tr>
        <td>${h.time}</td>
        <td>${h.pair}</td>
        <td class="${h.type==='BUY'?'buy-lbl':'sell-lbl'}">${h.type}</td>
        <td>${h.entry}</td>
        <td>${h.close}</td>
        <td>${h.amt}</td>
        <td class="${h.res==='WIN'?'win-lbl':'loss-lbl'}">${h.res}</td>
        <td style="color:${h.res==='WIN'?'var(--green)':'var(--red)'};font-weight:700">${h.profit}</td>
      </tr>`).join('');
  }

  /* ── Chart Rendering ── */
  startLoop(){
    const draw=()=>{this.draw();requestAnimationFrame(draw)};
    requestAnimationFrame(draw);
  }

  draw(){
    const ctx=this.ctx, dpr=this.dpr, W=this.cw, H=this.ch;
    if(!W||!H)return;

    ctx.save();
    ctx.scale(dpr,dpr);
    ctx.fillStyle='#0b0e13';
    ctx.fillRect(0,0,W,H);

    const all=[...this.candles];
    if(this.live)all.push(this.live);
    if(!all.length){ctx.restore();return}

    const PW=72, TH=20, CW=W-PW, CH=H-TH;
    const SHOW=Math.min(75,all.length);
    const vis=all.slice(-SHOW);
    const pair=PAIRS.find(p=>p.sym===this.sym)||PAIRS[0];
    const dec=pair.dec;

    // price range
    let lo=1e18,hi=-1e18;
    vis.forEach(c=>{if(c.l<lo)lo=c.l;if(c.h>hi)hi=c.h});
    const rng=hi-lo||1, pad=rng*0.08;
    const pMin=lo-pad, pMax=hi+pad, pRng=pMax-pMin;
    const py=p=>CH-((p-pMin)/pRng)*CH;

    const slot=CW/SHOW, bw=Math.max(1,slot*0.65);

    // Grid
    ctx.strokeStyle='#1a2030'; ctx.lineWidth=1;
    for(let i=0;i<=5;i++){
      const y=Math.round((i/5)*CH)+.5;
      ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(CW,y);ctx.stroke();
    }
    const step=Math.ceil(SHOW/7);
    vis.forEach((c,i)=>{
      if(i%step===0){
        const x=Math.round((i+.5)*slot)+.5;
        ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,CH);ctx.stroke();
      }
    });

    // Price axis
    ctx.fillStyle='#374151';
    ctx.font=`500 10px JetBrains Mono,monospace`;
    ctx.textAlign='center';
    for(let i=0;i<=5;i++){
      const price=pMax-(pRng*(i/5)), y=Math.round((i/5)*CH);
      ctx.fillText(price.toFixed(dec),CW+PW/2,y+(i===0?10:i===5?-2:3));
    }

    // Time axis
    ctx.fillStyle='#374151'; ctx.font='10px JetBrains Mono,monospace';
    vis.forEach((c,i)=>{
      if(i%step===0){
        const t=new Date(c.t);
        const ts=t.getHours().toString().padStart(2,'0')+':'+t.getMinutes().toString().padStart(2,'0');
        ctx.fillText(ts,Math.round((i+.5)*slot),CH+14);
      }
    });

    // Candles
    vis.forEach((c,i)=>{
      const x=Math.round((i+.5)*slot), isUp=c.c>=c.o;
      const clr=isUp?'#22c55e':'#ef4444';
      const isLive=!!(this.live&&i===vis.length-1);
      ctx.strokeStyle=clr; ctx.lineWidth=1;
      ctx.globalAlpha=isLive?.85:1;
      // wick
      ctx.beginPath();
      ctx.moveTo(x,Math.round(py(c.h)));
      ctx.lineTo(x,Math.round(py(c.l)));
      ctx.stroke();
      // body
      const top=py(Math.max(c.o,c.c)), bot=py(Math.min(c.o,c.c));
      const bh=Math.max(1,bot-top);
      ctx.fillStyle=isLive?(isUp?'rgba(34,197,94,.65)':'rgba(239,68,68,.65)'):clr;
      ctx.fillRect(Math.round(x-bw/2),Math.round(top),Math.round(bw),Math.round(bh));
      ctx.globalAlpha=1;
    });

    // Current price dashed line
    if(this.price>0&&py(this.price)>=0&&py(this.price)<=CH){
      const y=Math.round(py(this.price))+.5;
      const up=this.price>=this.prev;
      ctx.strokeStyle=up?'rgba(34,197,94,.45)':'rgba(239,68,68,.45)';
      ctx.lineWidth=1; ctx.setLineDash([4,4]);
      ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(CW,y);ctx.stroke();
      ctx.setLineDash([]);
      // label
      const lblColor=up?'#22c55e':'#ef4444';
      ctx.fillStyle=lblColor;
      ctx.fillRect(CW,y-9,PW,18);
      ctx.fillStyle='#fff'; ctx.font='700 10px JetBrains Mono,monospace';
      ctx.textAlign='center';
      ctx.fillText(this.price.toFixed(dec),CW+PW/2,y+4);
    }

    // Entry lines for active trades
    this.trades.forEach(tr=>{
      const y=py(tr.entry);
      if(y<0||y>CH)return;
      const yr=Math.round(y)+.5;
      const clr=tr.dir==='buy'?'#22c55e':'#ef4444';
      ctx.strokeStyle=clr; ctx.lineWidth=1;
      ctx.setLineDash([5,3]); ctx.globalAlpha=.5;
      ctx.beginPath();ctx.moveTo(0,yr);ctx.lineTo(CW,yr);ctx.stroke();
      ctx.setLineDash([]); ctx.globalAlpha=1;
    });

    // Axis divider
    ctx.strokeStyle='#252d3d'; ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(CW+.5,0);ctx.lineTo(CW+.5,H);ctx.stroke();

    ctx.restore();
  }

  /* ── Trade Logic ── */
  placeTrade(dir){
    if(this.price===0){this.showNotif('รอข้อมูลราคา...','loss');return}
    if(this.amt<1){this.showNotif('ใส่จำนวนเงินก่อน!','loss');return}
    if(this.amt>this.bal){this.showNotif('ยอดเงินไม่เพียงพอ!','loss');return}
    const trade={
      id:Date.now()+Math.random(),
      dir, entry:this.price,
      amt:this.amt, sym:this.sym,
      t0:Date.now(), exp:Date.now()+60000
    };
    this.bal-=this.amt;
    this.trades.push(trade);
    this.save();
    this.refreshBalUI();
    this.refreshActiveUI();
  }

  startCheckLoop(){
    setInterval(()=>{
      const now=Date.now();
      this.trades.filter(t=>now>=t.exp).forEach(t=>this.settle(t.id));
      if(this.trades.length)this.refreshActiveUI();
      if(this.tick)document.getElementById('tickInfo').textContent=
        (Date.now()-this.tick)<2000?'Live':Math.floor((Date.now()-this.tick)/1000)+'s ที่แล้ว';
    },200);
  }

  settle(id){
    const idx=this.trades.findIndex(t=>t.id===id);
    if(idx===-1)return;
    const tr=this.trades[idx];
    const cp=this.price;
    const won=tr.dir==='buy'?cp>tr.entry:cp<tr.entry;
    const profit=+(tr.amt*0.9).toFixed(2);
    if(won)this.bal=+(this.bal+tr.amt+profit).toFixed(2);
    const pair=PAIRS.find(p=>p.sym===tr.sym)||PAIRS[0];
    this.hist.unshift({
      time:new Date(tr.t0).toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit',second:'2-digit'}),
      pair:pair.name, type:tr.dir.toUpperCase(),
      entry:tr.entry.toFixed(pair.dec), close:cp.toFixed(pair.dec),
      amt:tr.amt.toFixed(2), res:won?'WIN':'LOSS',
      profit:won?'+'+profit.toFixed(2):'-'+tr.amt.toFixed(2)
    });
    if(this.hist.length>100)this.hist.pop();
    this.trades.splice(idx,1);
    this.showNotif(won?`WIN! +$${profit.toFixed(2)}`:`LOSS -$${tr.amt.toFixed(2)}`,won?'win':'loss');
    this.save();
    this.refreshBalUI();
    this.refreshHistUI();
    this.refreshActiveUI();
  }

  refreshActiveUI(){
    const wrap=document.getElementById('activeTradesWrap');
    if(!this.trades.length){wrap.innerHTML='';return}
    const C=2*Math.PI*14;
    wrap.innerHTML=this.trades.map(tr=>{
      const rem=Math.max(0,Math.ceil((tr.exp-Date.now())/1000));
      const prog=(60-rem)/60;
      const off=(C*(1-prog)).toFixed(1);
      const cur=tr.dir==='buy'?(this.price>tr.entry?tr.amt*.9:-tr.amt):(this.price<tr.entry?tr.amt*.9:-tr.amt);
      const pColor=cur>=0?'var(--green)':'var(--red)';
      const tColor=tr.dir==='buy'?'var(--green)':'var(--red)';
      const pair=PAIRS.find(p=>p.sym===tr.sym)||PAIRS[0];
      return `<div class="active-card">
        <div class="timer-ring">
          <svg width="36" height="36" style="transform:rotate(-90deg)">
            <circle cx="18" cy="18" r="14" fill="none" stroke="var(--border)" stroke-width="3"/>
            <circle cx="18" cy="18" r="14" fill="none" stroke="var(--blue)" stroke-width="3"
              stroke-linecap="round" stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${off}"/>
          </svg>
          <span class="timer-num">${rem}</span>
        </div>
        <div style="flex:1;margin-left:10px">
          <div style="font-weight:700;font-size:13px;color:${tColor}">${tr.dir.toUpperCase()} · ${pair.name}</div>
          <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)">Entry $${tr.entry.toFixed(pair.dec)} · $${tr.amt.toFixed(2)}</div>
        </div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:${pColor}">
          ${cur>=0?'+':''}$${Math.abs(cur).toFixed(2)}
        </div>
      </div>`;
    }).join('');
  }

  /* ── Amount Controls ── */
  onAmtInput(v){const n=parseFloat(v);if(!isNaN(n)&&n>=0){this.amt=n;this.refreshProfUI()}}
  addAmt(n){this.amt=Math.max(1,this.amt+n);document.getElementById('amtInput').value=this.amt;this.refreshProfUI()}
  setMax(){this.amt=Math.max(1,Math.floor(this.bal));document.getElementById('amtInput').value=this.amt;this.refreshProfUI()}

  /* ── Reset / Switch Pair ── */
  resetBalance(){
    if(!confirm('รีเซ็ตยอดเงินทดลองเป็น $10,000 ใช่ไหม?'))return;
    this.bal=10000; this.hist=[]; this.trades=[];
    this.save(); this.refreshBalUI(); this.refreshHistUI(); this.refreshActiveUI();
    this.showNotif('รีเซ็ตแล้ว! $10,000','win');
  }

  switchPair(sym){
    if(sym===this.sym){closePairModal();return}
    this.sym=sym; this.candles=[]; this.live=null; this.price=0; this.prev=0;
    localStorage.setItem('bt_sym',sym);
    this.refreshPairUI();
    this.renderPairModal();
    closePairModal();
    document.getElementById('currentPrice').textContent='$——,———.——';
    this.setConn('#eab308','กำลังโหลด...');
    this.loadCandles().then(()=>{
      if(this.ws){this.ws.onclose=null;try{this.ws.close()}catch(e){}}
      this.connectWS();
    });
  }

  changeInterval(intv,btn){
    if(intv===this.intv)return;
    this.intv=intv;
    document.querySelectorAll('.tf-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    this.candles=[]; this.live=null;
    this.loadCandles().then(()=>{
      if(this.ws){this.ws.onclose=null;try{this.ws.close()}catch(e){}}
      this.connectWS();
    });
  }

  refreshPairUI(){
    const p=PAIRS.find(x=>x.sym===this.sym)||PAIRS[0];
    document.getElementById('pairIconEl').textContent=p.icon;
    document.getElementById('pairIconEl').style.background=p.color;
    document.getElementById('pairNameEl').textContent=p.name;
  }

  renderPairModal(){
    document.getElementById('pairList').innerHTML=PAIRS.map(p=>`
      <div class="pair-opt ${p.sym===this.sym?'sel':''}" onclick="app.switchPair('${p.sym}')">
        <div class="coin-icon" style="background:${p.color};width:28px;height:28px;font-size:13px">${p.icon}</div>
        <div>
          <div class="pair-opt-name">${p.name}</div>
          <div class="pair-opt-sub">Binance · Binary Options</div>
        </div>
        <span class="checkmark">✓</span>
      </div>`).join('');
  }

  showNotif(txt,type){
    const el=document.getElementById('notification');
    el.textContent=txt; el.className='notification '+type+' show';
    clearTimeout(this._notif);
    this._notif=setTimeout(()=>{el.className='notification '+type},2800);
  }

  save(){
    localStorage.setItem('bt_bal',this.bal.toString());
    localStorage.setItem('bt_hist',JSON.stringify(this.hist));
  }
}

/* ── Modal helpers ── */
function openPairModal(){app.renderPairModal();document.getElementById('pairModal').classList.add('show')}
function closePairModal(){document.getElementById('pairModal').classList.remove('show')}

/* ── Boot ── */
let app;
window.addEventListener('DOMContentLoaded',()=>{app=new App()});
</script>
