<!DOCTYPE html>
<html lang="lo">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soukchai & Buachan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <style>
    /* ═══════════════════════════════════════
       VARIABLES & RESET
    ═══════════════════════════════════════ */
    :root {
      --navy:   #0d1b3e;
      --blue:   #1a3a8f;
      --mid:    #2563eb;
      --sky:    #60a5fa;
      --gold:   #f59e0b;
      --light:  #f0f5ff;
      --white:  #ffffff;
      --text:   #1e293b;
      --muted:  #64748b;
      --card-bg:#ffffff;
      --shadow: 0 4px 24px rgba(13,27,62,.10);
      --radius: 16px;
      --nav-h:  68px;
      --ease:   cubic-bezier(.4,0,.2,1);
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    html { scroll-behavior:smooth; }

    body {
      font-family:'Noto Sans Lao', sans-serif;
      background: var(--light);
      color: var(--text);
      line-height: 1.7;
      overflow-x: hidden;
    }

    /* ═══════════════════════════════════════
       NAVBAR
    ═══════════════════════════════════════ */
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-h);
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(37,99,235,.12);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 clamp(16px, 5vw, 48px);
      box-shadow: 0 2px 20px rgba(13,27,62,.07);
      transition: box-shadow .3s var(--ease);
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .nav-logo {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--blue), var(--sky));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; color: white; font-weight: 700;
      box-shadow: 0 2px 12px rgba(37,99,235,.35);
      flex-shrink: 0;
    }

    .nav-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      color: var(--navy);
      font-weight: 700;
      letter-spacing: .3px;
      white-space: nowrap;
    }

    /* Desktop menu */
    .nav-links {
      display: flex;
      align-items: center;
      gap: 4px;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--muted);
      font-size: .95rem;
      font-weight: 600;
      padding: 8px 18px;
      border-radius: 50px;
      transition: all .25s var(--ease);
      white-space: nowrap;
    }

    .nav-links a:hover,
    .nav-links a.active {
      background: var(--blue);
      color: var(--white);
    }

    /* Hamburger button */
    .hamburger {
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 44px; height: 44px;
      border: none;
      background: transparent;
      cursor: pointer;
      border-radius: 10px;
      gap: 5px;
      padding: 6px;
      transition: background .2s;
      -webkit-tap-highlight-color: transparent;
    }

    .hamburger:hover { background: var(--light); }

    .hamburger span {
      display: block;
      width: 24px; height: 2.5px;
      background: var(--navy);
      border-radius: 3px;
      transition: all .35s var(--ease);
      transform-origin: center;
    }

    /* Open state */
    .hamburger.open span:nth-child(1) { transform: translateY(7.5px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .hamburger.open span:nth-child(3) { transform: translateY(-7.5px) rotate(-45deg); }

    /* Mobile drawer */
    .mobile-menu {
      display: none;
      position: fixed;
      top: var(--nav-h);
      left: 0; right: 0;
      background: rgba(255,255,255,.97);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(37,99,235,.1);
      padding: 16px 24px 24px;
      z-index: 9998;
      transform: translateY(-12px);
      opacity: 0;
      pointer-events: none;
      transition: all .3s var(--ease);
      box-shadow: 0 16px 40px rgba(13,27,62,.12);
    }

    .mobile-menu.open {
      opacity: 1;
      transform: translateY(0);
      pointer-events: all;
    }

    .mobile-menu ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .mobile-menu ul li a {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: var(--text);
      font-size: 1.05rem;
      font-weight: 600;
      padding: 14px 18px;
      border-radius: 12px;
      transition: all .2s var(--ease);
    }

    .mobile-menu ul li a:hover {
      background: var(--light);
      color: var(--blue);
    }

    .mobile-menu ul li a .menu-icon {
      font-size: 1.2rem;
      width: 28px;
      text-align: center;
    }

    /* Overlay */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(13,27,62,.3);
      backdrop-filter: blur(2px);
      z-index: 9990;
      opacity: 0;
      transition: opacity .3s;
    }

    .overlay.open { opacity: 1; }

    /* ═══════════════════════════════════════
       HEADER / HERO
    ═══════════════════════════════════════ */
    .hero {
      min-height: 100vh;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(37,99,235,.18) 0%, transparent 70%),
        linear-gradient(160deg, var(--navy) 0%, #0f2460 50%, #162d6b 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: calc(var(--nav-h) + 40px) 24px 60px;
      position: relative;
      overflow: hidden;
    }

    /* Floating blobs */
    .hero::before, .hero::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      pointer-events: none;
    }

    .hero::before {
      width: 400px; height: 400px;
      background: rgba(37,99,235,.25);
      top: -80px; right: -80px;
      animation: float1 8s ease-in-out infinite;
    }

    .hero::after {
      width: 300px; height: 300px;
      background: rgba(96,165,250,.15);
      bottom: 40px; left: -60px;
      animation: float2 10s ease-in-out infinite;
    }

    @keyframes float1 {
      0%,100% { transform: translate(0,0) scale(1); }
      50% { transform: translate(30px, 20px) scale(1.08); }
    }

    @keyframes float2 {
      0%,100% { transform: translate(0,0) scale(1); }
      50% { transform: translate(-20px, -30px) scale(1.05); }
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(245,158,11,.15);
      border: 1px solid rgba(245,158,11,.4);
      color: var(--gold);
      font-size: .8rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 50px;
      margin-bottom: 28px;
      animation: fadeUp .6s var(--ease) both;
    }

    .hero-avatar {
      width: 110px; height: 110px;
      border-radius: 50%;
      background: linear-gradient(135deg, #60a5fa, #2563eb, #1a3a8f);
      border: 4px solid rgba(255,255,255,.2);
      margin: 0 auto 24px;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.8rem;
      box-shadow: 0 0 0 8px rgba(37,99,235,.15), 0 16px 40px rgba(0,0,0,.3);
      animation: fadeUp .7s var(--ease) .1s both;
      position: relative;
      z-index: 1;
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 6vw, 3.5rem);
      color: var(--white);
      margin-bottom: 14px;
      animation: fadeUp .7s var(--ease) .15s both;
      position: relative; z-index: 1;
    }

    .hero p {
      font-size: clamp(.95rem, 2.5vw, 1.15rem);
      color: rgba(255,255,255,.65);
      max-width: 520px;
      margin: 0 auto 36px;
      animation: fadeUp .7s var(--ease) .2s both;
      position: relative; z-index: 1;
    }

    .hero-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--gold);
      color: var(--navy);
      font-weight: 700;
      font-size: 1rem;
      padding: 14px 32px;
      border-radius: 50px;
      text-decoration: none;
      box-shadow: 0 8px 24px rgba(245,158,11,.35);
      transition: all .25s var(--ease);
      animation: fadeUp .7s var(--ease) .25s both;
      position: relative; z-index: 1;
    }

    .hero-cta:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 32px rgba(245,158,11,.45);
    }

    /* Marquee strip */
    .marquee-strip {
      background: linear-gradient(90deg, var(--blue), var(--mid));
      color: white;
      padding: 12px 0;
      overflow: hidden;
      white-space: nowrap;
    }

    .marquee-inner {
      display: inline-block;
      animation: marquee 20s linear infinite;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .marquee-sep {
      display: inline-block;
      margin: 0 32px;
      opacity: .5;
    }

    @keyframes marquee {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* ═══════════════════════════════════════
       LAYOUT
    ═══════════════════════════════════════ */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 clamp(16px, 4vw, 40px);
    }

    .section {
      padding: 72px 0;
    }

    .section-header {
      margin-bottom: 44px;
    }

    .section-label {
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 10px;
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      color: var(--navy);
      line-height: 1.2;
    }

    .section-line {
      width: 48px; height: 4px;
      background: linear-gradient(90deg, var(--mid), var(--sky));
      border-radius: 2px;
      margin-top: 14px;
    }

    .main-grid {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 32px;
      align-items: start;
    }

    @media (max-width: 960px) {
      .main-grid { grid-template-columns: 1fr; }
    }

    /* ═══════════════════════════════════════
       CARDS
    ═══════════════════════════════════════ */
    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 28px;
      margin-bottom: 28px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(37,99,235,.07);
      transition: box-shadow .3s var(--ease), transform .3s var(--ease);
    }

    .card:hover {
      box-shadow: 0 8px 40px rgba(13,27,62,.13);
      transform: translateY(-2px);
    }

    .card-heading {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--navy);
      border-bottom: 2px solid var(--light);
      padding-bottom: 14px;
      margin-bottom: 20px;
    }

    .card-icon {
      font-size: 1.4rem;
      flex-shrink: 0;
    }

    /* ═══════════════════════════════════════
       PRODUCT GRID
    ═══════════════════════════════════════ */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 16px;
    }

    .product-item {
      background: var(--light);
      border: 1.5px solid rgba(37,99,235,.1);
      border-radius: 12px;
      padding: 20px 16px;
      text-align: center;
      transition: all .3s var(--ease);
      cursor: default;
    }

    .product-item:hover {
      background: var(--blue);
      border-color: var(--blue);
      transform: translateY(-6px);
      box-shadow: 0 12px 28px rgba(37,99,235,.3);
    }

    .product-item:hover * { color: white !important; }

    .product-item .pi-emoji {
      font-size: 2rem;
      margin-bottom: 10px;
      display: block;
    }

    .product-item h4 {
      font-size: .95rem;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 6px;
    }

    .product-item p {
      font-size: .8rem;
      color: var(--muted);
      line-height: 1.5;
    }

    /* ═══════════════════════════════════════
       ENTERTAINMENT
    ═══════════════════════════════════════ */
    .ent-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @media (max-width: 480px) { .ent-grid { grid-template-columns: 1fr; } }

    .ent-item {
      border-radius: 12px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: transform .3s var(--ease);
    }

    .ent-item:hover { transform: translateY(-4px); }

    .ent-item.red { background: linear-gradient(135deg, #fff5f5, #ffe4e4); border: 1.5px solid #fca5a5; }
    .ent-item.yellow { background: linear-gradient(135deg, #fffbeb, #fef3c7); border: 1.5px solid #fcd34d; }

    .ent-item strong { font-size: 1rem; color: var(--navy); }
    .ent-item p { font-size: .85rem; color: var(--muted); }

    /* ═══════════════════════════════════════
       APP LIST
    ═══════════════════════════════════════ */
    .app-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .app-list li {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      background: var(--light);
      padding: 16px;
      border-radius: 12px;
      border: 1.5px solid rgba(37,99,235,.08);
      transition: all .25s var(--ease);
    }

    .app-list li:hover {
      border-color: var(--sky);
      background: rgba(96,165,250,.07);
    }

    .app-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--mid);
      margin-top: 6px;
      flex-shrink: 0;
    }

    .app-list li strong { color: var(--blue); }

    /* ═══════════════════════════════════════
       NEWS
    ═══════════════════════════════════════ */
    .news-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .news-item {
      background: var(--light);
      border-radius: 12px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      border: 1.5px solid rgba(37,99,235,.08);
      transition: all .25s var(--ease);
    }

    .news-item:hover {
      border-color: var(--sky);
      transform: translateX(4px);
    }

    .news-tag {
      display: inline-block;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 50px;
      width: fit-content;
    }

    .news-tag.blue { background: var(--blue); color: white; }
    .news-tag.green { background: #059669; color: white; }

    .news-item h4 { font-size: .95rem; color: var(--navy); line-height: 1.5; }

    /* ═══════════════════════════════════════
       SIDEBAR – OWNER INFO
    ═══════════════════════════════════════ */
    .owner-card {
      background: linear-gradient(135deg, var(--navy), #162d6b);
      border-radius: var(--radius);
      padding: 30px;
      color: white;
      box-shadow: 0 8px 32px rgba(13,27,62,.25);
      position: sticky;
      top: calc(var(--nav-h) + 20px);
    }

    .owner-avatar {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--sky), var(--mid));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem;
      margin: 0 auto 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,.25);
    }

    .owner-card h2 {
      font-size: 1.2rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 6px;
    }

    .owner-card > p {
      font-size: .85rem;
      color: rgba(255,255,255,.65);
      text-align: center;
      margin-bottom: 22px;
      line-height: 1.6;
    }

    .divider {
      height: 1px;
      background: rgba(255,255,255,.12);
      margin: 18px 0;
    }

    .contact-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }

    .contact-icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: rgba(255,255,255,.12);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .contact-label {
      font-size: .72rem;
      color: rgba(255,255,255,.5);
      margin-bottom: 2px;
      letter-spacing: .5px;
      text-transform: uppercase;
    }

    .contact-val {
      font-size: .88rem;
      color: white;
      font-weight: 600;
      word-break: break-all;
    }

    .social-row {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .social-btn {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      background: rgba(255,255,255,.1);
      color: white;
      text-align: center;
      font-size: .8rem;
      font-weight: 600;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,.15);
      transition: background .2s;
    }

    .social-btn:hover { background: rgba(255,255,255,.2); }

    /* ═══════════════════════════════════════
       FOOTER
    ═══════════════════════════════════════ */
    footer {
      background: var(--navy);
      color: rgba(255,255,255,.55);
      text-align: center;
      padding: 28px 24px;
      font-size: .85rem;
      border-top: 1px solid rgba(255,255,255,.06);
    }

    footer strong { color: rgba(255,255,255,.85); }

    /* ═══════════════════════════════════════
       ANIMATIONS
    ═══════════════════════════════════════ */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .fade-in {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity .6s var(--ease), transform .6s var(--ease);
    }

    .fade-in.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ═══════════════════════════════════════
       RESPONSIVE BREAKPOINTS
    ═══════════════════════════════════════ */
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .hamburger { display: flex; }
      .mobile-menu { display: block; }
    }

    @media (min-width: 769px) {
      .mobile-menu { display: none !important; }
      .overlay { display: none !important; }
    }

    @media (max-width: 520px) {
      .product-grid { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 360px) {
      .product-grid { grid-template-columns: 1fr; }
    }

    /* Scroll-to-top */
    .scroll-top {
      position: fixed;
      bottom: 28px; right: 24px;
      width: 46px; height: 46px;
      border-radius: 50%;
      background: var(--blue);
      color: white;
      border: none;
      cursor: pointer;
      font-size: 1.2rem;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(37,99,235,.35);
      opacity: 0; pointer-events: none;
      transform: translateY(10px);
      transition: all .3s var(--ease);
      z-index: 500;
    }

    .scroll-top.show {
      opacity: 1; pointer-events: all;
      transform: translateY(0);
    }

    .scroll-top:hover { background: var(--navy); transform: translateY(-3px); }
  </style>
</head>
<body>

<!-- ══════════════════════════════
     NAVBAR
══════════════════════════════ -->
<nav class="navbar" id="navbar">
  <a class="nav-brand" href="#top">
    <div class="nav-logo">S</div>
    <span class="nav-title">Soukchai & Buachan</span>
  </a>

  <ul class="nav-links">
    <li><a href="#products" class="nav-link">🛒 ສິນຄ້າ</a></li>
    <li><a href="#enterta
